# azure-pipelines.yml
trigger:
  branches:
    include:
      - main
      - develop

variables:
  - group: Salesforce-DevOrg-Vars

stages:

# ─────────────────────────────────────────
# STAGE 1: Validate (Runs on ALL branches)
# ─────────────────────────────────────────
- stage: Validate
  displayName: 'Validate Salesforce Metadata'
  jobs:
  - job: ValidateJob
    displayName: 'Validate Deployment'
    timeoutInMinutes: 60           # FIX: prevent silent agent timeout
    steps:

    - checkout: self
      fetchDepth: 1                # FIX: shallow clone = faster checkout

    - task: NodeTool@1             # FIX: upgraded from NodeTool@0 (deprecated)
      inputs:
        versionSpec: '18.x'
      displayName: 'Install Node.js'

    - script: |
        npm install --global @salesforce/cli --quiet
        sf version
      displayName: 'Install Salesforce CLI'
      retryCountOnTaskFailure: 2   # FIX: retry if npm install flakes

    - script: |
        echo "$(SERVER_KEY_BASE64)" | base64 --decode > $(Agent.TempDirectory)/server.key
        echo "Private key decoded successfully"
      displayName: 'Decode Private Key'

    - script: |
        sf org login jwt \
          --client-id "$(SF_CONSUMER_KEY)" \
          --jwt-key-file "$(Agent.TempDirectory)/server.key" \
          --username "$(SF_USERNAME)" \
          --instance-url "$(SF_INSTANCE_URL)" \
          --alias DevOrg \
          --set-default
        echo "Authentication successful"
      displayName: 'Authenticate to Salesforce'

    - script: |
        sf project deploy validate \
          --source-dir force-app \
          --target-org DevOrg \
          --test-level RunLocalTests \
          --wait 30 \              # FIX: was missing -- prevents premature timeout
          --no-progress            # FIX: cleaner logs, avoids noise
      displayName: 'Validate Metadata (Dry Run)'

    - script: |
        rm -f $(Agent.TempDirectory)/server.key
        echo "Key file cleaned up"
      displayName: 'Cleanup Key File'
      condition: always()          # Always clean up even on failure

# ─────────────────────────────────────────
# STAGE 2: Deploy (Only on main branch)
# ─────────────────────────────────────────
- stage: Deploy
  displayName: 'Deploy to Salesforce Dev Org'
  dependsOn: Validate
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployJob
    displayName: 'Deploy Metadata'
    timeoutInMinutes: 90           # FIX: deployments take longer than validate
    environment: 'Salesforce-DevOrg'
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self
            fetchDepth: 1          # FIX: shallow clone = faster checkout

          - task: NodeTool@1       # FIX: upgraded from NodeTool@0 (deprecated)
            inputs:
              versionSpec: '18.x'
            displayName: 'Install Node.js'

          - script: |
              npm install --global @salesforce/cli --quiet
            displayName: 'Install Salesforce CLI'
            retryCountOnTaskFailure: 2   # FIX: retry on flaky npm

          - script: |
              echo "$(SERVER_KEY_BASE64)" | base64 --decode > $(Agent.TempDirectory)/server.key
              echo "Private key decoded successfully"
            displayName: 'Decode Private Key'

          - script: |
              sf org login jwt \
                --client-id "$(SF_CONSUMER_KEY)" \
                --jwt-key-file "$(Agent.TempDirectory)/server.key" \
                --username "$(SF_USERNAME)" \
                --instance-url "$(SF_INSTANCE_URL)" \
                --alias DevOrg \
                --set-default
              echo "Authentication successful"
            displayName: 'Authenticate to Salesforce'

          - script: |
              sf project deploy start \
                --source-dir force-app \
                --target-org DevOrg \
                --test-level RunLocalTests \
                --wait 60 \        # FIX: increased from 30 for larger deployments
                --no-progress      # FIX: cleaner logs
            displayName: 'Deploy to Dev Org'

          - script: |
              rm -f $(Agent.TempDirectory)/server.key
              echo "Key file cleaned up"
            displayName: 'Cleanup Key File'
            condition: always()
