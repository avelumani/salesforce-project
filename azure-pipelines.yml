# azure-pipelines.yml
trigger:
  branches:
    include:
      - main
      - develop

variables:
  - group: Salesforce-DevOrg-Vars

stages:

# ─────────────────────────────────────────
# STAGE 1: Validate (Runs on ALL branches)
# ─────────────────────────────────────────
- stage: Validate
  displayName: 'Validate Salesforce Metadata'
  jobs:
  - job: ValidateJob
    displayName: 'Validate Deployment'
    timeoutInMinutes: 60
    steps:

    - checkout: self
      fetchDepth: 1

    - script: |
        # Install SF CLI via official standalone installer (no Node.js dependency)
        wget -q https://developer.salesforce.com/media/salesforce-cli/sf/channels/stable/sf-linux-x64.tar.xz
        sudo tar -xJf sf-linux-x64.tar.xz -C /usr/local/lib
        sudo ln -sf /usr/local/lib/sf/bin/sf /usr/local/bin/sf
        sf version
      displayName: 'Install Salesforce CLI'

    - script: |
        echo "$(SERVER_KEY_BASE64)" | base64 --decode > $(Agent.TempDirectory)/server.key
        echo "Private key decoded successfully"
      displayName: 'Decode Private Key'

    - script: |
        sf org login jwt \
          --client-id "$(SF_CONSUMER_KEY)" \
          --jwt-key-file "$(Agent.TempDirectory)/server.key" \
          --username "$(SF_USERNAME)" \
          --instance-url "$(SF_INSTANCE_URL)" \
          --alias DevOrg \
          --set-default
        echo "Authentication successful"
      displayName: 'Authenticate to Salesforce'

    - script: |
        sf project deploy validate \
          --source-dir force-app \
          --target-org DevOrg \
          --test-level RunLocalTests \
          --wait 30 \
          
      displayName: 'Validate Metadata (Dry Run)'

    - script: |
        rm -f $(Agent.TempDirectory)/server.key
        echo "Key file cleaned up"
      displayName: 'Cleanup Key File'
      condition: always()

# ─────────────────────────────────────────
# STAGE 2: Deploy (Only on main branch)
# ─────────────────────────────────────────
- stage: Deploy
  displayName: 'Deploy to Salesforce Dev Org'
  dependsOn: Validate
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployJob
    displayName: 'Deploy Metadata'
    timeoutInMinutes: 90
    environment: 'Salesforce-DevOrg'
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self
            fetchDepth: 1

          - script: |
              # Install SF CLI via official standalone installer (no Node.js dependency)
              wget -q https://developer.salesforce.com/media/salesforce-cli/sf/channels/stable/sf-linux-x64.tar.xz
              sudo tar -xJf sf-linux-x64.tar.xz -C /usr/local/lib
              sudo ln -sf /usr/local/lib/sf/bin/sf /usr/local/bin/sf
              sf version
            displayName: 'Install Salesforce CLI'

          - script: |
              echo "$(SERVER_KEY_BASE64)" | base64 --decode > $(Agent.TempDirectory)/server.key
              echo "Private key decoded successfully"
            displayName: 'Decode Private Key'

          - script: |
              sf org login jwt \
                --client-id "$(SF_CONSUMER_KEY)" \
                --jwt-key-file "$(Agent.TempDirectory)/server.key" \
                --username "$(SF_USERNAME)" \
                --instance-url "$(SF_INSTANCE_URL)" \
                --alias DevOrg \
                --set-default
              echo "Authentication successful"
            displayName: 'Authenticate to Salesforce'

          - script: |
              sf project deploy start \
                --source-dir force-app \
                --target-org DevOrg \
                --test-level RunLocalTests \
                --wait 60 \
                
            displayName: 'Deploy to Dev Org'

          - script: |
              rm -f $(Agent.TempDirectory)/server.key
              echo "Key file cleaned up"
            displayName: 'Cleanup Key File'
            condition: always()
