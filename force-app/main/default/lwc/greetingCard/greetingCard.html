<!-- force-app/main/default/lwc/greetingCard/greetingCard.html -->
<template>
    <lightning-card title={cardTitle} icon-name="standard:contact">

        <template lwc:if={isLoading}>
            <div class="slds-align_absolute-center slds-p-around_medium">
                <lightning-spinner alternative-text="Loading..." size="small"></lightning-spinner>
            </div>
        </template>

        <template lwc:if={hasError}>
            <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                <lightning-icon icon-name="utility:error" size="x-small"
                    class="slds-m-right_x-small" alternative-text="Error">
                </lightning-icon>
                {errorMessage}
            </div>
        </template>

        <template lwc:if={hasGreeting}>
            <div class="slds-p-around_medium slds-text-heading_medium">
                {greeting}
            </div>
        </template>

        <div slot="footer">
            <lightning-button
                label="Refresh"
                icon-name="utility:refresh"
                onclick={handleRefresh}
                disabled={isLoading}>
            </lightning-button>
        </div>

    </lightning-card>
</template>
